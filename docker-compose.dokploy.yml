services:
  canvas-n8n:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --ws-ping-interval
      - "0"
    expose:
      - "3000"
    volumes:
      - /home/deploy/canvas-n8n/runtime/API:/app/API
      - /home/deploy/canvas-n8n/runtime/data:/app/data
      - /home/deploy/canvas-n8n/runtime/assets:/app/assets
      - /home/deploy/canvas-n8n/runtime/output:/app/output
      - /home/deploy/canvas-n8n/runtime/workflows:/app/workflows
      - /home/deploy/canvas-n8n/runtime/history.json:/app/history.json
      - /home/deploy/canvas-n8n/runtime/global_config.json:/app/global_config.json
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/app-info', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
